<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repair UN Museum Cache</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#03142d;color:white;font-family:Arial;text-align:center;padding:24px}
main{max-width:620px;padding:32px;border:1px solid #39cfff55;border-radius:24px;background:#ffffff0a}
button{padding:14px 20px;border:0;border-radius:12px;background:#5ce1ff;color:#001426;font-weight:800}
p{line-height:1.6;color:#c7dbea}
</style>
</head>
<body>
<main>
<h1>Repairing the UN Museum</h1>
<p id="status">Removing the old cached website files…</p>
<button id="repair">Repair and open website</button>
</main>
<script>
async function repair(){
  document.getElementById("status").textContent="Clearing old service workers and caches…";
  try{
    if("serviceWorker" in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(reg=>reg.unregister()));
    }
    if("caches" in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(key=>caches.delete(key)));
    }
  }catch(e){}
  document.getElementById("status").textContent="Repair complete. Opening the corrected website…";
  location.replace("./index.html?v=5.2-"+Date.now());
}
document.getElementById("repair").onclick=repair;
setTimeout(repair,500);
</script>
</body>
</html>
